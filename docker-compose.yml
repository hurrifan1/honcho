# Honcho Docker Compose
#
# Usage:
#   cp docker-compose.yml.example docker-compose.yml
#   cp .env.template .env  # edit with your provider config
#   docker compose up -d --build
#
# By default, ports are bound to 127.0.0.1 (localhost only).
# For development, uncomment the source mounts and monitoring services below.

services:
  api:
    container_name: honcho-api
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    #ports:
    #  - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    # -- Development: mount source for live reload --
    # volumes:
    #   - .:/app
    #   - venv:/app/.venv
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:postgres@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    networks:
      - honcho-net
      - larc-net

  deriver:
    container_name: honcho-deriver
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    # -- Development: mount source for live reload --
    # volumes:
    #   - .:/app
    #   - venv:/app/.venv
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:postgres@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    networks:
      - honcho-net

  database:
    container_name: honcho-pg
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    #ports:
    #  - "127.0.0.1:5432:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # Allow passwordless connections from the host (port is bound to 127.0.0.1).
      # Lets the local test suite and ad-hoc tools connect without supplying a
      # password. Do NOT use this in production.
      #- POSTGRES_HOST_AUTH_METHOD=trust
      - honcho-pg-data=/var/lib/postgresql/data/pgdata
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - honcho-pg-data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - honcho-net

  redis:
    container_name: honcho-redis
    image: redis:8.2
    restart: unless-stopped
    #ports:
    #  - "127.0.0.1:6379:6379"
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - honcho-net

volumes:
  honcho-pg-data:
    external: true
  honcho-redis-data:
    external: true

networks:
  honcho-net:
    driver: bridge
  larc-net:
    external: true
